<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouBike 2.0 台北即時地圖</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="youbike-map.css">
</head>
<body>
<!-- LOADING -->
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <p class="loading-text">正在載入即時資料…</p>
</div>

<!-- HEADER -->
<header>
  <div class="header-left">
    <div class="logo-wrap">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-label="YouBike logo" xmlns="http://www.w3.org/2000/svg">
        <rect width="28" height="28" rx="7" fill="var(--color-primary)"/>
        <circle cx="9" cy="19" r="3.5" stroke="white" stroke-width="1.8"/>
        <circle cx="19" cy="19" r="3.5" stroke="white" stroke-width="1.8"/>
        <path d="M9 19 L13 10 L19 10 L19 19" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <path d="M13 10 L16 14" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <div>
        <div class="logo-text">YouBike 2.0</div>
        <div class="logo-sub">台北市即時地圖</div>
      </div>
    </div>
    <div class="update-badge">
      <span class="update-dot"></span>
      <span id="update-time">載入中</span>
    </div>
  </div>
  <button class="theme-toggle" data-theme-toggle aria-label="切換深色模式">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>
</header>

<!-- KPI ROW -->
<div class="kpi-row">
  <div class="kpi-card">
    <span class="kpi-label">總站點</span>
    <span class="kpi-value teal" id="kpi-total">–</span>
  </div>
  <div class="kpi-card">
    <span class="kpi-label">可借車輛</span>
    <span class="kpi-value green" id="kpi-bikes">–</span>
  </div>
  <div class="kpi-card">
    <span class="kpi-label">可還空位</span>
    <span class="kpi-value teal" id="kpi-space">–</span>
  </div>
  <div class="kpi-card">
    <span class="kpi-label">無車站數</span>
    <span class="kpi-value red" id="kpi-empty">–</span>
  </div>
  <div class="kpi-card">
    <span class="kpi-label">整體可借率</span>
    <span class="kpi-value orange" id="kpi-rate">–</span>
  </div>
</div>

<!-- MAIN -->
<div class="main-layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="filter-bar">
      <span class="filter-label">篩選站點</span>
      <input class="filter-input" type="text" id="search-input" placeholder="搜尋站名…">
      <div class="filter-chips">
        <button class="chip active" data-filter="all">全部</button>
        <button class="chip" data-filter="ok">有車</button>
        <button class="chip" data-filter="empty">無車</button>
        <button class="chip" data-filter="full">無位</button>
      </div>
    </div>
    <div class="sidebar-header">
      <span>站點列表</span>
      <span id="sidebar-count" style="color:var(--color-text-faint)">–</span>
    </div>
    <div class="sidebar-list" id="station-list">
      <div class="empty-state">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <p>搜尋站點名稱</p>
      </div>
    </div>
  </aside>

  <!-- MAP -->
  <div class="map-shell">
    <div id="map"></div>
    <div class="map-controls" aria-label="地圖工具">
      <button class="map-control-btn" id="locate-button" type="button" aria-label="定位到目前位置" title="定位到目前位置">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="7"/><circle cx="12" cy="12" r="2"/></svg>
      </button>
      <button class="map-control-btn" id="refresh-button" type="button" aria-label="重新整理資料" title="重新整理資料">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 0 1-15.1 6.64"/><path d="M3 12A9 9 0 0 1 18.1 5.36"/><path d="M21 3v6h-6"/><path d="M3 21v-6h6"/></svg>
      </button>
    </div>
    <div class="map-legend">
      <div class="legend-title">可借車輛數</div>
      <div class="legend-row"><div class="legend-dot" style="width:20px;height:20px;background:#6daa45;opacity:0.85;border:2px solid rgba(255,255,255,0.3)"></div><span class="legend-text">充足（≥10）</span></div>
      <div class="legend-row"><div class="legend-dot" style="width:14px;height:14px;background:#bb653b;opacity:0.85;border:2px solid rgba(255,255,255,0.3)"></div><span class="legend-text">偏少（1–9）</span></div>
      <div class="legend-row"><div class="legend-dot" style="width:10px;height:10px;background:#a12c7b;opacity:0.85;border:2px solid rgba(255,255,255,0.3)"></div><span class="legend-text">無車（0）</span></div>
      <div style="margin-top:var(--space-2);padding-top:var(--space-2);border-top:1px solid var(--color-border)">
        <div class="legend-title" style="margin-bottom:4px">圓點大小</div>
        <div style="font-size:var(--text-xs);color:var(--color-text-muted)">= 可借車輛數量</div>
      </div>
    </div>
  </div>
</div>

<script type="module" src="youbike-map.js"></script>
</body>
</html>
